<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessibility Tools</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, Roboto, system-ui, -apple-system, Segoe UI, sans-serif;
      }

      body {
        margin: 0;
        padding: 2rem;
        line-height: 1.5;
      }

      main {
        max-width: 780px;
        margin: 0 auto;
      }

      h1 {
        margin-top: 0;
      }

      .card {
        border: 1px solid rgba(127, 127, 127, 0.35);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        margin-top: 1rem;
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Accessibility Tools</h1>
      <p>
        This repository now includes a standalone GitHub Pages site deployed with
        GitHub Actions.
      </p>
      <div class="card">
        <strong>What this is:</strong>
        <p>
          A lightweight static project for repository visibility, release links,
          and basic project information.
        </p>
      </div>
      <div class="card">
        <strong>Project repository:</strong>
        <p>
          <a href="https://github.com/mgifford/accessibility-tools">
            github.com/mgifford/accessibility-tools
          </a>
        </p>
      </div>
    </main>
  </body>
</html>
