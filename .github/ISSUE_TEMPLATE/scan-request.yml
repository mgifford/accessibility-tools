name: Accessibility scan request
description: Request a queued website accessibility scan
labels:
  - scan-request
body:
  - type: input
    id: target_url
    attributes:
      label: Target URL
      description: URL to scan
      placeholder: https://example.com
    validations:
      required: true

  - type: input
    id: crawl_depth
    attributes:
      label: Crawl depth
      description: 0-5 depth for same-domain crawl
      value: '2'

  - type: input
    id: max_pages
    attributes:
      label: Max pages
      description: 1-500 pages
      value: '25'

  - type: dropdown
    id: report_type
    attributes:
      label: Report type
      description: >
        **summary** — lightweight report with aggregate statistics and top violations only.
        Faster to generate and much smaller output. Recommended for large sites or quick checks.
        Does not include per-page violation details or a full results JSON file.

        **full** — complete report including per-page violation details in the HTML report
        and a `results.json` file with every individual finding. Best for deep analysis,
        but can be very large (tens of MB) for sites with many violations.
      options:
        - summary
        - full
      default: 0
