name: Web Accessibility Scan + Pages

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Originating scan request issue number'
        required: false
        type: string
      target_url:
        description: 'Target URL to scan'
        required: true
        type: string
      crawl_depth:
        description: 'Crawl depth (0-5)'
        required: false
        default: '2'
        type: string
      max_pages:
        description: 'Max pages to scan (1-500)'
        required: false
        default: '25'
        type: string
      report_type:
        description: 'Report level'
        required: false
        default: 'summary'
        type: choice
        options:
          - summary
          - full
  schedule:
    - cron: '30 6 * * *'

permissions:
  contents: read
  actions: read
  issues: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DEFAULT_SCHEDULE_SCAN_URL: 'https://mgifford.github.io/accessibility-tools/'

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve inputs
        id: resolve
        run: |
          set -euo pipefail

          TARGET_URL="${{ github.event.inputs.target_url }}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="${{ vars.DEFAULT_SCAN_URL }}"
          fi
          if [ -z "$TARGET_URL" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            TARGET_URL="${{ env.DEFAULT_SCHEDULE_SCAN_URL }}"
          fi
          if [ -z "$TARGET_URL" ]; then
            echo "Missing target URL (set workflow input, repo variable DEFAULT_SCAN_URL, or workflow env DEFAULT_SCHEDULE_SCAN_URL)." >&2
            exit 1
          fi

          CRAWL_DEPTH="${{ github.event.inputs.crawl_depth }}"
          MAX_PAGES="${{ github.event.inputs.max_pages }}"
          REPORT_TYPE="${{ github.event.inputs.report_type }}"
          ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"

          if [ -z "$CRAWL_DEPTH" ]; then CRAWL_DEPTH="2"; fi
          if [ -z "$MAX_PAGES" ]; then MAX_PAGES="25"; fi
          if [ -z "$REPORT_TYPE" ]; then REPORT_TYPE="summary"; fi

          echo "target_url=$TARGET_URL" >> "$GITHUB_OUTPUT"
          echo "crawl_depth=$CRAWL_DEPTH" >> "$GITHUB_OUTPUT"
          echo "max_pages=$MAX_PAGES" >> "$GITHUB_OUTPUT"
          echo "report_type=$REPORT_TYPE" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: tools/webscan/package.json

      - name: Install scanner dependencies
        run: npm --prefix tools/webscan install --no-package-lock

      - name: Install Playwright browser
        run: npx --yes playwright@1.55.1 install --with-deps chromium

      - name: Run scan
        run: |
          set -euo pipefail
          mkdir -p /tmp/webscan-output
          node tools/webscan/src/run-scan.mjs \
            --url "${{ steps.resolve.outputs.target_url }}" \
            --depth "${{ steps.resolve.outputs.crawl_depth }}" \
            --max_pages "${{ steps.resolve.outputs.max_pages }}" \
            --report_type "${{ steps.resolve.outputs.report_type }}" \
            --respect_robots true \
            --out /tmp/webscan-output

      - name: Build report metadata
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowName = 'Web Accessibility Scan + Pages';
            const assetBaseNames = [
              { label: 'HTML report', file: 'report.html' },
              { label: 'Summary JSON', file: 'summary.json' },
              { label: 'Results JSON', file: 'results.json' },
              { label: 'URLs JSON', file: 'urls.json' }
            ];

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100
            });

            const scanRuns = [];
            for (const run of runs.filter(r => r.name === workflowName).slice(0, 50)) {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner,
                repo,
                run_id: run.id,
                per_page: 100
              });

              const artifact = (data.artifacts || []).find(candidate => candidate.name === `webscan-${run.id}`)
                || (data.artifacts || []).find(candidate => candidate.name.startsWith('webscan-'))
                || null;

              scanRuns.push({
                id: run.id,
                runNumber: run.run_number,
                status: run.status,
                conclusion: run.conclusion,
                event: run.event,
                createdAt: run.created_at,
                updatedAt: run.updated_at,
                htmlUrl: run.html_url,
                reportUrl: `reports/${run.id}/report.html`,
                assets: assetBaseNames.map(asset => ({
                  label: asset.label,
                  file: asset.file,
                  path: `reports/${run.id}/${asset.file}`
                })),
                artifact: artifact ? {
                  id: artifact.id,
                  name: artifact.name,
                  expired: artifact.expired,
                  downloadUrl: artifact.archive_download_url
                } : null
              });
            }

            const reportIndex = {
              schemaVersion: 1,
              generatedAt: new Date().toISOString(),
              workflowName,
              latestReportUrl: 'reports/latest/report.html',
              runs: scanRuns
            };

            const history = {
              schemaVersion: 2,
              generatedAt: reportIndex.generatedAt,
              workflowName,
              runs: scanRuns.map(({ artifact, assets, ...run }) => ({
                ...run,
                artifactId: artifact?.id || null
              }))
            };

            const dataDir = path.join(process.cwd(), 'gh-pages', 'data');
            const tempDir = path.join(process.cwd(), '.tmp');
            fs.mkdirSync(dataDir, { recursive: true });
            fs.mkdirSync(tempDir, { recursive: true });
            fs.writeFileSync(path.join(dataDir, 'history.json'), JSON.stringify(history, null, 2));
            fs.writeFileSync(path.join(dataDir, 'report-index.json'), JSON.stringify(reportIndex, null, 2));
            fs.writeFileSync(
              path.join(tempDir, 'report-artifacts.json'),
              JSON.stringify(
                scanRuns
                  .filter(run => run.id !== context.runId && run.artifact?.downloadUrl && !run.artifact?.expired),
                null,
                2
              )
            );

      - name: Restore recent report assets
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import io
          import json
          import os
          import shutil
          import urllib.parse
          import urllib.request
          import zipfile
          from pathlib import Path

          class _NoAuthOnRedirect(urllib.request.HTTPRedirectHandler):
              """Strip the Authorization header when following redirects to non-GitHub hosts.

              GitHub's artifact download endpoint returns a 302 redirect to Azure Blob
              Storage.  Forwarding the bearer token to a third-party host causes a 401
              because Azure does not accept GitHub tokens as authentication.
              """
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  new_req = super().redirect_request(req, fp, code, msg, headers, newurl)
                  if new_req is not None:
                      parsed = urllib.parse.urlparse(newurl)
                      if 'github.com' not in (parsed.netloc or ''):
                          new_req.remove_header('Authorization')
                  return new_req

          manifest_path = Path('.tmp/report-artifacts.json')
          if not manifest_path.exists():
              raise SystemExit(0)

          try:
              runs = json.loads(manifest_path.read_text(encoding='utf-8'))
          except json.JSONDecodeError:
              runs = []

          opener = urllib.request.build_opener(_NoAuthOnRedirect)

          auth_headers = {
              'Authorization': f"Bearer {os.environ['GITHUB_TOKEN']}",
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28'
          }

          for run in runs:
              download_url = ((run.get('artifact') or {}).get('downloadUrl') or '').strip()
              if not download_url:
                  continue

              target_dir = Path('gh-pages') / 'reports' / str(run['id'])
              if target_dir.exists():
                  shutil.rmtree(target_dir)
              target_dir.mkdir(parents=True, exist_ok=True)

              request = urllib.request.Request(download_url, headers=auth_headers)
              with opener.open(request, timeout=90) as response:
                  payload = response.read()

              with zipfile.ZipFile(io.BytesIO(payload)) as archive:
                  archive.extractall(target_dir)
          PY

      - name: Prepare Pages content
        run: |
          set -euo pipefail

          LATEST_DIR="gh-pages/reports/latest"
          RUN_DIR="gh-pages/reports/${{ github.run_id }}"
          mkdir -p gh-pages/data "$LATEST_DIR" "$RUN_DIR"

          cp /tmp/webscan-output/summary.json gh-pages/data/latest.json
          cp -R /tmp/webscan-output/. "$RUN_DIR/"
          rm -rf "$LATEST_DIR"/*
          cp -R "$RUN_DIR"/. "$LATEST_DIR/"

      - name: Mark report availability
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          reports_dir = Path('gh-pages/reports')
          for data_file in ['gh-pages/data/history.json', 'gh-pages/data/report-index.json']:
              p = Path(data_file)
              if not p.exists():
                  continue
              data = json.loads(p.read_text(encoding='utf-8'))
              for run in data.get('runs', []):
                  run['reportAvailable'] = (reports_dir / str(run['id']) / 'report.html').exists()
              p.write_text(json.dumps(data, indent=2), encoding='utf-8')
          PY

      - name: Upload scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: webscan-${{ github.run_id }}
          path: /tmp/webscan-output
          retention-days: 30

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Comment and close scan request issue
        if: ${{ steps.resolve.outputs.issue_number != '' }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number.parseInt(`${{ steps.resolve.outputs.issue_number }}`, 10);
            if (!Number.isFinite(issueNumber) || issueNumber <= 0) {
              core.warning(`Skipping issue close: invalid issue number "${{ steps.resolve.outputs.issue_number }}"`);
              return;
            }

            const pageUrlRaw = `${{ steps.deployment.outputs.page_url }}`.trim();
            const pageUrl = pageUrlRaw
              ? (pageUrlRaw.endsWith('/') ? pageUrlRaw : `${pageUrlRaw}/`)
              : `https://${owner}.github.io/${repo}/`;
            const runReportUrl = `${pageUrl}reports/${context.runId}/report.html`;
            const latestReportUrl = `${pageUrl}reports/latest/report.html`;
            const latestSummaryUrl = `${pageUrl}data/latest.json`;

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });

            const issueLabels = new Set((issue.labels || []).map(label => label.name));
            if (!issueLabels.has('scan-request')) {
              core.warning(`Issue #${issueNumber} is not labeled scan-request; skipping close.`);
              return;
            }

            // Build a rich scan summary from the scan output
            let summary = null;
            try {
              summary = JSON.parse(fs.readFileSync('/tmp/webscan-output/summary.json', 'utf8'));
            } catch {
              core.warning('Could not read summary.json; using basic comment.');
            }

            const lines = ['✅ Scan complete.', ''];

            if (summary) {
              const t = summary.totals || {};
              lines.push(`**Target:** ${summary.targetUrl}`);
              lines.push(`**Scanned:** ${summary.generatedAt}`);
              lines.push('');
              lines.push('| Metric | Count |');
              lines.push('|--------|-------|');
              lines.push(`| Pages discovered | ${t.pagesDiscovered ?? 0} |`);
              lines.push(`| Pages scanned | ${t.pagesScanned ?? 0} |`);
              lines.push(`| Pages failed | ${t.pagesFailed ?? 0} |`);
              lines.push(`| Total violations | ${t.totalViolations ?? 0} |`);
              lines.push(`| Total incomplete | ${t.totalIncomplete ?? 0} |`);
              lines.push(`| Unique violation rules | ${t.uniqueViolationRules ?? 0} |`);

              const topViolations = (summary.topViolations || []).slice(0, 10);
              if (topViolations.length > 0) {
                lines.push('');
                lines.push('### Top Violations');
                lines.push('');
                lines.push('| Rule | Impact | Pages | Nodes | Description |');
                lines.push('|------|--------|-------|-------|-------------|');
                for (const v of topViolations) {
                  const desc = v.help ? `[${v.help}](${v.helpUrl})` : '-';
                  lines.push(`| \`${v.id}\` | ${v.impact} | ${v.pagesAffected} | ${v.nodeCount} | ${desc} |`);
                }
              } else {
                lines.push('');
                lines.push('🎉 No accessibility violations were detected.');
              }
            }

            lines.push('');
            lines.push('### Reports');
            lines.push('');
            lines.push(`- [HTML report](${runReportUrl})`);
            lines.push(`- [Latest HTML report](${latestReportUrl})`);
            lines.push(`- [Latest summary JSON](${latestSummaryUrl})`);
            lines.push(`- [Workflow run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})`);

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: lines.join('\n')
            });

            // Remove scan-queued and scan-request labels
            for (const labelName of ['scan-queued', 'scan-request']) {
              if (issueLabels.has(labelName)) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    name: labelName
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
            }

            if (issue.state !== 'closed') {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                state: 'closed',
                state_reason: 'completed'
              });
            }

      - name: Remove scan-queued label on failure
        if: failure() && steps.resolve.outputs.issue_number != ''
        uses: actions/github-script@v9
        with:
          script: |
            const issueNumber = Number.parseInt(`${{ steps.resolve.outputs.issue_number }}`, 10);
            if (!Number.isFinite(issueNumber) || issueNumber <= 0) return;
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'scan-queued'
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

      - name: Workflow summary
        if: always()
        run: |
          echo "## Web scan run" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.resolve.outputs.target_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Depth: ${{ steps.resolve.outputs.crawl_depth }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Max pages: ${{ steps.resolve.outputs.max_pages }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Report type: ${{ steps.resolve.outputs.report_type }}" >> "$GITHUB_STEP_SUMMARY"
